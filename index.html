<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="author" content="smuxo">
    <meta name="version" content="0.1.0">
    <meta name="theme-color" content="#000023">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="images/icon-192.png">
    <link rel="apple-touch-icon" href="images/icon-192.png">
    <title>kosmos</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        canvas {
            display: block;
        }

        #loader {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: #000008;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            transition: opacity 0.7s ease;
            font-family: 'Arial', sans-serif;
        }

        #loader.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loader-title {
            color: lightyellow;
            font-size: clamp(26px, 6vw, 40px);
            letter-spacing: 0.55em;
            margin-left: 0.55em;
            animation: loaderPulse 2.2s ease-in-out infinite;
        }

        .loader-bar {
            width: min(60vw, 320px);
            height: 2px;
            background: rgba(255, 255, 224, 0.15);
            border-radius: 2px;
            overflow: hidden;
        }

        .loader-fill {
            width: 0%;
            height: 100%;
            background: lightyellow;
            box-shadow: 0 0 8px rgba(255, 255, 200, 0.8);
            transition: width 0.3s ease;
        }

        .loader-percent {
            color: rgba(255, 255, 224, 0.5);
            font-size: 13px;
            letter-spacing: 0.2em;
        }

        @keyframes loaderPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.45; }
        }

        #gui-container {
            position: absolute;
            top: max(10px, env(safe-area-inset-top));
            right: max(10px, env(safe-area-inset-right));
            z-index: 10;
        }

        .planet-info {
            display: none;
            position: fixed;
            left: 1%;
            top: 25%;
            width: min(30%, 420px);
            z-index: 20;
        }

        .planet-info-content {
            background-color: rgba(0, 0, 35, 0.92);
            padding: 20px;
            border: 1px solid #888;
            border-radius: 10px;
            box-shadow: 0px 0px 10px 3px rgba(255,255,0,0.5);
            color: white;
            font-family: 'Arial', sans-serif;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .close-btn {
            color: lightyellow;
            float: right;
            font-size: clamp(28px, 6vw, 34px);
            font-weight: bold;
            line-height: 1;
            padding: 0 6px;
        }

        .close-btn:hover,
        .close-btn:focus {
            color: white;
            cursor: pointer;
        }

        h2 {
            color: lightyellow;
            margin: 0 0 10px 0;
            font-size: clamp(20px, 4.5vw, 26px);
        }

        p {
            color: white;
            line-height: 1.5;
            margin: 0;
            font-size: clamp(13px, 3.4vw, 16px);
        }

        @media (max-width: 820px), (pointer: coarse) and (max-height: 500px) {
            .planet-info {
                left: 0;
                right: 0;
                top: auto;
                bottom: 0;
                width: auto;
            }

            .planet-info-content {
                border-radius: 16px 16px 0 0;
                border-bottom: none;
                max-height: 42vh;
                padding: 16px 16px calc(16px + env(safe-area-inset-bottom)) 16px;
            }
        }

        @media (max-width: 820px) {
            #gui-container .dg.main {
                transform: scale(0.92);
                transform-origin: top right;
            }
        }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
            "dat.gui": "https://cdn.jsdelivr.net/npm/dat.gui@0.7.9/build/dat.gui.module.js"
        }
    }
    </script>
</head>
<body>
    <div id="loader">
        <div class="loader-title">KOSMOS</div>
        <div class="loader-bar"><div class="loader-fill" id="loaderFill"></div></div>
        <div class="loader-percent" id="loaderPercent">0%</div>
    </div>
    <div id="gui-container"></div>
    <div id="planetInfo" class="planet-info">
        <div class="planet-info-content">
            <span class="close-btn" onclick="closeInfo()">&times;</span>
            <h2 id="planetName"></h2>
            <p id="planetDetails"></p>
        </div>
    </div>
    <script type="module">
import * as THREE from 'three';
import * as dat from 'dat.gui';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutlinePass } from 'three/addons/postprocessing/OutlinePass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const sunTexture = 'images/sun.jpg';
const mercuryTexture = 'images/mercurymap.jpg';
const mercuryBump = 'images/mercurybump.jpg';
const venusTexture = 'images/venusmap.jpg';
const venusBump = 'images/venusmap.jpg';
const venusAtmosphere = 'images/venus_atmosphere.jpg';
const earthTexture = 'images/earth_daymap.jpg';
const earthNightTexture = 'images/earth_nightmap.jpg';
const earthAtmosphere = 'images/earth_atmosphere.jpg';
const earthMoonTexture = 'images/moonmap.jpg';
const earthMoonBump = 'images/moonbump.jpg';
const marsTexture = 'images/marsmap.jpg';
const marsBump = 'images/marsbump.jpg';
const jupiterTexture = 'images/jupiter.jpg';
const ioTexture = 'images/jupiterIo.jpg';
const europaTexture = 'images/jupiterEuropa.jpg';
const ganymedeTexture = 'images/jupiterGanymede.jpg';
const callistoTexture = 'images/jupiterCallisto.jpg';
const saturnTexture = 'images/saturnmap.jpg';
const satRingTexture = 'images/saturn_ring.png';
const uranusTexture = 'images/uranus.jpg';
const uraRingTexture = 'images/uranus_ring.png';
const neptuneTexture = 'images/neptune.jpg';
const plutoTexture = 'images/plutomap.jpg';

const isMobile = window.matchMedia('(pointer: coarse)').matches || window.innerWidth < 820;

const Q = isMobile ? {
    samples: 4,
    shadowMap: 1024,
    stars: 3500,
    dust: 600,
    beltInner: 400,
    beltOuter: 1200,
    maxDpr: 1.5
} : {
    samples: 8,
    shadowMap: 2048,
    stars: 9000,
    dust: 1600,
    beltInner: 1000,
    beltOuter: 3000,
    maxDpr: 2
};

const BLOOM_LAYER = 1;
const bloomLayer = new THREE.Layers();
bloomLayer.set(BLOOM_LAYER);

const scene = new THREE.Scene();

var camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1500);
camera.position.set(-175, 115, 5);

const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, Q.maxDpr));
document.body.appendChild(renderer.domElement);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.screenSpacePanning = false;
controls.minDistance = 15;
controls.maxDistance = 450;

let texLoaded = 0;
let texTotal = 0;
let texDone = false;
let glbLoaded = 0;
let glbTotal = 0;
let loaderHidden = false;

const loaderEl = document.getElementById('loader');
const loaderFill = document.getElementById('loaderFill');
const loaderPercent = document.getElementById('loaderPercent');

function updateLoader() {
    const total = texTotal + glbTotal;
    const loaded = texLoaded + glbLoaded;
    const pct = total > 0 ? Math.min(100, Math.round(loaded / total * 100)) : 0;
    loaderFill.style.width = pct + '%';
    loaderPercent.textContent = pct + '%';
    if (texDone && glbLoaded >= glbTotal) hideLoader();
}

function hideLoader() {
    if (loaderHidden) return;
    loaderHidden = true;
    loaderFill.style.width = '100%';
    loaderPercent.textContent = '100%';
    setTimeout(function() {
        loaderEl.classList.add('hidden');
        setTimeout(function() { loaderEl.remove(); }, 800);
    }, 250);
}

setTimeout(hideLoader, 25000);

const loadingManager = new THREE.LoadingManager();
loadingManager.onProgress = function(url, itemsLoaded, itemsTotal) {
    texLoaded = itemsLoaded;
    texTotal = itemsTotal;
    updateLoader();
};
loadingManager.onLoad = function() {
    texDone = true;
    updateLoader();
};
loadingManager.onError = function(url) {
    console.error('Texture load failed', url);
};

const loadTexture = new THREE.TextureLoader(loadingManager);
const maxAniso = renderer.capabilities.getMaxAnisotropy();

function tex(path, srgb = true) {
    const t = loadTexture.load(path);
    t.anisotropy = maxAniso;
    if (srgb) t.colorSpace = THREE.SRGBColorSpace;
    return t;
}

const renderTargetOptions = { samples: Q.samples, type: THREE.HalfFloatType };
const size = renderer.getDrawingBufferSize(new THREE.Vector2());

const bloomTarget = new THREE.WebGLRenderTarget(size.x, size.y, renderTargetOptions);
const bloomComposer = new EffectComposer(renderer, bloomTarget);
bloomComposer.renderToScreen = false;
bloomComposer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(new THREE.Vector2(size.x, size.y), 0.42, 0.4, 0.1);
bloomComposer.addPass(bloomPass);

const finalTarget = new THREE.WebGLRenderTarget(size.x, size.y, renderTargetOptions);
const finalComposer = new EffectComposer(renderer, finalTarget);
finalComposer.addPass(new RenderPass(scene, camera));

const mixPass = new ShaderPass(
    new THREE.ShaderMaterial({
        uniforms: {
            baseTexture: { value: null },
            bloomTexture: { value: bloomComposer.renderTarget2.texture }
        },
        vertexShader: `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `,
        fragmentShader: `
            uniform sampler2D baseTexture;
            uniform sampler2D bloomTexture;
            varying vec2 vUv;
            void main() {
                gl_FragColor = texture2D(baseTexture, vUv) + texture2D(bloomTexture, vUv);
            }
        `
    }),
    'baseTexture'
);
mixPass.needsSwap = true;
finalComposer.addPass(mixPass);

const outlinePass = new OutlinePass(new THREE.Vector2(size.x, size.y), scene, camera);
outlinePass.edgeStrength = 3;
outlinePass.edgeGlow = 1;
outlinePass.visibleEdgeColor.set(0xffffff);
outlinePass.hiddenEdgeColor.set(0x190a05);
finalComposer.addPass(outlinePass);

finalComposer.addPass(new OutputPass());

const darkMaterial = new THREE.MeshBasicMaterial({ color: 0x000000 });
const materialCache = {};

function darkenNonBloomed(obj) {
    if ((obj.isMesh || obj.isPoints || obj.isLine || obj.isSprite) && !bloomLayer.test(obj.layers)) {
        materialCache[obj.uuid] = obj.material;
        obj.material = darkMaterial;
    }
}

function restoreMaterials(obj) {
    if (materialCache[obj.uuid]) {
        obj.material = materialCache[obj.uuid];
        delete materialCache[obj.uuid];
    }
}

var lightAmbient = new THREE.AmbientLight(0x222222, 6);
scene.add(lightAmbient);

const cubeTextureLoader = new THREE.CubeTextureLoader(loadingManager);
scene.background = cubeTextureLoader.load([
    'images/3.jpg',
    'images/1.jpg',
    'images/2.jpg',
    'images/2.jpg',
    'images/4.jpg',
    'images/2.jpg'
]);

const dustCount = Q.dust;
const dustPositions = new Float32Array(dustCount * 3);
for (let i = 0; i < dustCount; i++) {
    const a = Math.random() * Math.PI * 2;
    const r = 30 + Math.pow(Math.random(), 0.7) * 390;
    dustPositions[i * 3] = Math.cos(a) * r;
    dustPositions[i * 3 + 1] = (Math.random() + Math.random() - 1) * 2.2;
    dustPositions[i * 3 + 2] = Math.sin(a) * r;
}
const dustGeometry = new THREE.BufferGeometry();
dustGeometry.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
const dust = new THREE.Points(dustGeometry, new THREE.PointsMaterial({
    size: 0.55,
    color: 0x9a8a66,
    transparent: true,
    opacity: 0.26,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    sizeAttenuation: true
}));
scene.add(dust);

const gui = new dat.GUI({ autoPlace: false });
const customContainer = document.getElementById('gui-container');
customContainer.appendChild(gui.domElement);
if (isMobile) gui.close();

const settings = {
    accelerationOrbit: 1,
    acceleration: 1,
    sunIntensity: 1.9
};

gui.add(settings, 'accelerationOrbit', 0, 10).onChange(value => {
});
gui.add(settings, 'acceleration', 0, 10).onChange(value => {
});
gui.add(settings, 'sunIntensity', 1, 10).onChange(value => {
    sunMat.emissiveIntensity = value;
});

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2(-2, -2);

function onMouseMove(event) {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
}

let selectedPlanet = null;
let isMovingTowardsPlanet = false;
let targetCameraPosition = new THREE.Vector3();
let offset;

function selectAt(clientX, clientY) {
    mouse.x = (clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    var intersects = raycaster.intersectObjects(raycastTargets);

    if (intersects.length > 0) {
        const clickedObject = intersects[0].object;
        selectedPlanet = identifyPlanet(clickedObject);
        if (selectedPlanet) {
            closeInfoNoZoomOut();

            settings.accelerationOrbit = 0;

            const planetPosition = new THREE.Vector3();
            selectedPlanet.planet.getWorldPosition(planetPosition);
            controls.target.copy(planetPosition);
            camera.lookAt(planetPosition);

            targetCameraPosition.copy(planetPosition).add(camera.position.clone().sub(planetPosition).normalize().multiplyScalar(offset));
            isMovingTowardsPlanet = true;
        }
    }
}

let pointerDownX = 0;
let pointerDownY = 0;

renderer.domElement.addEventListener('pointerdown', function(e) {
    pointerDownX = e.clientX;
    pointerDownY = e.clientY;
});

renderer.domElement.addEventListener('pointerup', function(e) {
    if (Math.hypot(e.clientX - pointerDownX, e.clientY - pointerDownY) < 7) {
        selectAt(e.clientX, e.clientY);
    }
});

function identifyPlanet(clickedObject) {
        if (clickedObject.material === mercury.planet.material) {
            offset = 10;
            return mercury;
        } else if (clickedObject.material === venus.Atmosphere.material) {
            offset = 25;
            return venus;
        } else if (clickedObject.material === earth.Atmosphere.material) {
            offset = 25;
            return earth;
        } else if (clickedObject.material === mars.planet.material) {
            offset = 15;
            return mars;
        } else if (clickedObject.material === jupiter.planet.material) {
            offset = 50;
            return jupiter;
        } else if (clickedObject.material === saturn.planet.material) {
            offset = 50;
            return saturn;
        } else if (clickedObject.material === uranus.planet.material) {
            offset = 25;
            return uranus;
        } else if (clickedObject.material === neptune.planet.material) {
            offset = 20;
            return neptune;
        } else if (clickedObject.material === pluto.planet.material) {
            offset = 10;
            return pluto;
        }

    return null;
}

function showPlanetInfo(planet) {
    var info = document.getElementById('planetInfo');
    var name = document.getElementById('planetName');
    var details = document.getElementById('planetDetails');

    name.innerText = planet;
    details.innerText = `Radius: ${planetData[planet].radius}\nTilt: ${planetData[planet].tilt}\nRotation: ${planetData[planet].rotation}\nOrbit: ${planetData[planet].orbit}\nDistance: ${planetData[planet].distance}\nMoons: ${planetData[planet].moons}\nInfo: ${planetData[planet].info}`;

    info.style.display = 'block';
}
let isZoomingOut = false;
let zoomOutTargetPosition = new THREE.Vector3(-175, 115, 5);

function closeInfo() {
    var info = document.getElementById('planetInfo');
    info.style.display = 'none';
    settings.accelerationOrbit = 1;
    isZoomingOut = true;
    controls.target.set(0, 0, 0);
}
window.closeInfo = closeInfo;

function closeInfoNoZoomOut() {
    var info = document.getElementById('planetInfo');
    info.style.display = 'none';
    settings.accelerationOrbit = 1;
}

function makeGlowMaterial(color, c, p, opacity) {
    return new THREE.ShaderMaterial({
        uniforms: {
            glowColor: { value: new THREE.Color(color) },
            c: { value: c },
            p: { value: p },
            uOpacity: { value: opacity }
        },
        vertexShader: `
            varying vec3 vNormal;
            void main() {
                vNormal = normalize(normalMatrix * normal);
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `,
        fragmentShader: `
            uniform vec3 glowColor;
            uniform float c;
            uniform float p;
            uniform float uOpacity;
            varying vec3 vNormal;
            void main() {
                float intensity = pow(max(c - dot(vNormal, vec3(0.0, 0.0, 1.0)), 0.0), p);
                gl_FragColor = vec4(glowColor, 1.0) * intensity * uOpacity;
            }
        `,
        side: THREE.BackSide,
        blending: THREE.AdditiveBlending,
        transparent: true,
        depthWrite: false
    });
}

let sunMat;

const sunSize = 697 / 40;
const sunGeom = new THREE.SphereGeometry(sunSize, 48, 32);
sunMat = new THREE.MeshStandardMaterial({
    emissive: 0xFFF88F,
    emissiveMap: tex(sunTexture),
    emissiveIntensity: settings.sunIntensity
});
const sun = new THREE.Mesh(sunGeom, sunMat);
sun.layers.enable(BLOOM_LAYER);
scene.add(sun);

function glowTexture(sizePx) {
    const canvas = document.createElement('canvas');
    canvas.width = canvas.height = sizePx;
    const ctx = canvas.getContext('2d');
    const grad = ctx.createRadialGradient(sizePx / 2, sizePx / 2, 0, sizePx / 2, sizePx / 2, sizePx / 2);
    grad.addColorStop(0, 'rgba(255,240,200,0.85)');
    grad.addColorStop(0.25, 'rgba(255,200,110,0.35)');
    grad.addColorStop(0.55, 'rgba(255,150,60,0.1)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, sizePx, sizePx);
    const t = new THREE.CanvasTexture(canvas);
    t.colorSpace = THREE.SRGBColorSpace;
    return t;
}

const sunGlow = new THREE.Sprite(new THREE.SpriteMaterial({
    map: glowTexture(256),
    transparent: true,
    opacity: 0.45,
    blending: THREE.AdditiveBlending,
    depthWrite: false
}));
sunGlow.scale.set(sunSize * 3.6, sunSize * 3.6, 1);
sunGlow.layers.enable(BLOOM_LAYER);
sun.add(sunGlow);

const pointLight = new THREE.PointLight(0xFDFFD3, 1200, 400, 1.4);
pointLight.castShadow = true;
pointLight.shadow.mapSize.width = Q.shadowMap;
pointLight.shadow.mapSize.height = Q.shadowMap;
pointLight.shadow.camera.near = sunSize + 2;
pointLight.shadow.camera.far = 420;
pointLight.shadow.bias = -0.0015;
pointLight.shadow.normalBias = 0.06;
scene.add(pointLight);

function createPlanet(planetName, size, position, tilt, texture, bump, ring, atmosphere, moons, rimGlow) {

    let material;
    if (texture instanceof THREE.Material) {
        material = texture;
    }
    else if (bump) {
        material = new THREE.MeshPhongMaterial({
        map: tex(texture),
        bumpMap: tex(bump, false),
        bumpScale: 0.7
        });
    }
    else {
        material = new THREE.MeshPhongMaterial({
        map: tex(texture)
        });
    }

    const name = planetName;
    const geometry = new THREE.SphereGeometry(size, 48, 32);
    const planet = new THREE.Mesh(geometry, material);
    const planet3d = new THREE.Object3D;
    const planetSystem = new THREE.Group();
    planetSystem.add(planet);
    let Atmosphere;
    let Ring;
    planet.position.x = position;
    planet.rotation.z = tilt * Math.PI / 180;

    const orbitPath = new THREE.EllipseCurve(
        0, 0,
        position, position,
        0, 2 * Math.PI,
        false,
        0
    );

    const pathPoints = orbitPath.getPoints(180);
    const orbitGeometry = new THREE.BufferGeometry().setFromPoints(pathPoints);
    const orbitColors = new Float32Array(pathPoints.length * 3);
    for (let i = 0; i < pathPoints.length; i++) {
        const fade = 0.02 + 0.42 * Math.pow(1 - i / (pathPoints.length - 1), 2.2);
        orbitColors[i * 3] = fade;
        orbitColors[i * 3 + 1] = fade;
        orbitColors[i * 3 + 2] = fade * 1.15;
    }
    orbitGeometry.setAttribute('color', new THREE.BufferAttribute(orbitColors, 3));
    const orbitMaterial = new THREE.LineBasicMaterial({
        vertexColors: true,
        transparent: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false
    });
    const orbit = new THREE.LineLoop(orbitGeometry, orbitMaterial);
    orbit.rotation.x = Math.PI / 2;
    planetSystem.add(orbit);

    if (ring)
    {
        const RingGeo = new THREE.RingGeometry(ring.innerRadius, ring.outerRadius, 96, 4);
        const RingMat = new THREE.MeshStandardMaterial({
            map: tex(ring.texture),
            side: THREE.DoubleSide,
            transparent: true,
            depthWrite: false
        });
        Ring = new THREE.Mesh(RingGeo, RingMat);
        Ring.receiveShadow = true;
        planetSystem.add(Ring);
        Ring.position.x = position;
        Ring.rotation.x = -0.5 * Math.PI;
        Ring.rotation.y = -tilt * Math.PI / 180;
    }

    if (atmosphere) {
        const atmosphereGeom = new THREE.SphereGeometry(size + 0.1, 48, 32);
        const atmosphereMaterial = new THREE.MeshPhongMaterial({
            map: tex(atmosphere),
            transparent: true,
            opacity: 0.4,
            depthTest: true,
            depthWrite: false
        })
        Atmosphere = new THREE.Mesh(atmosphereGeom, atmosphereMaterial)

        Atmosphere.rotation.z = 0.41;
        planet.add(Atmosphere);
    }

    if (rimGlow) {
        const rim = new THREE.Mesh(
            new THREE.SphereGeometry(size, 48, 32),
            makeGlowMaterial(rimGlow.color, rimGlow.c, rimGlow.p, rimGlow.opacity)
        );
        rim.scale.setScalar(rimGlow.scale);
        planet.add(rim);
    }

    if (moons) {
        moons.forEach(moon => {
            let moonMaterial;

            if (moon.bump) {
                moonMaterial = new THREE.MeshStandardMaterial({
                    map: tex(moon.texture),
                    bumpMap: tex(moon.bump, false),
                    bumpScale: 0.5
                });
            } else {
                moonMaterial = new THREE.MeshStandardMaterial({
                    map: tex(moon.texture)
                });
            }
            const moonGeometry = new THREE.SphereGeometry(moon.size, 32, 20);
            const moonMesh = new THREE.Mesh(moonGeometry, moonMaterial);
            const moonOrbitDistance = size * 1.5;
            moonMesh.position.set(moonOrbitDistance, 0, 0);
            planetSystem.add(moonMesh);
            moon.mesh = moonMesh;
        });
    }

    planet3d.add(planetSystem);
    scene.add(planet3d);
    return { name, planet, planet3d, Atmosphere, moons, planetSystem, Ring };
}

const gltfLoader = new GLTFLoader();

function loadGLB(path, onLoad) {
    glbTotal++;
    const done = function() {
        glbLoaded++;
        updateLoader();
    };
    const xhr = new XMLHttpRequest();
    xhr.open('GET', path, true);
    xhr.responseType = 'arraybuffer';
    xhr.onload = function() {
        if (xhr.status >= 200 && xhr.status < 300 && xhr.response) {
            gltfLoader.parse(xhr.response, '', function(gltf) {
                done();
                onLoad(gltf);
            }, function(error) {
                console.error('GLB parse error', path, error);
                done();
            });
        } else {
            console.error('GLB load failed', path, xhr.status);
            done();
        }
    };
    xhr.onerror = function() {
        console.error('GLB network error', path);
        done();
    };
    xhr.send();
}

function loadObject(path, position, scale, callback) {
    loadGLB(path, function (gltf) {
        const obj = gltf.scene;
        obj.position.set(position, 0, 0);
        obj.scale.set(scale, scale, scale);
        scene.add(obj);
        if (callback) {
            callback(obj);
        }
    });
}

const asteroids = [];
function loadAsteroids(path, numberOfAsteroids, minOrbitRadius, maxOrbitRadius) {
    loadGLB(path, function (gltf) {
        gltf.scene.traverse(function (child) {
            if (child.isMesh) {
                for (let i = 0; i < numberOfAsteroids / 12; i++) {
                    const asteroid = child.clone();
                    const orbitRadius = THREE.MathUtils.randFloat(minOrbitRadius, maxOrbitRadius);
                    const angle = Math.random() * Math.PI * 2;
                    const x = orbitRadius * Math.cos(angle);
                    const y = (Math.random() - 0.5) * 1.6;
                    const z = orbitRadius * Math.sin(angle);
                    asteroid.receiveShadow = true;
                    asteroid.position.set(x, y, z);
                    asteroid.scale.setScalar(THREE.MathUtils.randFloat(0.8, 1.2));
                    scene.add(asteroid);
                    asteroids.push(asteroid);
                }
            }
        });
    });
}

const earthMaterial = new THREE.ShaderMaterial({
    uniforms: {
        dayTexture: { value: tex(earthTexture) },
        nightTexture: { value: tex(earthNightTexture) },
        sunPosition: { value: sun.position }
    },
    vertexShader: `
        varying vec3 vNormal;
        varying vec2 vUv;
        varying vec3 vSunDirection;

        uniform vec3 sunPosition;

        void main() {
            vUv = uv;
            vec4 worldPosition = modelMatrix * vec4(position, 1.0);
            vNormal = normalize(modelMatrix * vec4(normal, 0.0)).xyz;
            vSunDirection = normalize(sunPosition - worldPosition.xyz);
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    `,
    fragmentShader: `
        uniform sampler2D dayTexture;
        uniform sampler2D nightTexture;

        varying vec3 vNormal;
        varying vec2 vUv;
        varying vec3 vSunDirection;

        void main() {
            float intensity = max(dot(vNormal, vSunDirection), 0.0);
            vec4 dayColor = texture2D(dayTexture, vUv);
            vec4 nightColor = texture2D(nightTexture, vUv) * 0.2;
            gl_FragColor = mix(nightColor, dayColor, intensity);
        }
    `
});
